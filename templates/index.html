<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPS Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="container mx-auto p-4 lg:p-6">
        <header class="mb-8 flex flex-wrap justify-between items-center border-b border-gray-700 pb-4 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight">IPS MONITOR <span class="text-xs bg-red-600 text-white px-2 py-1 rounded ml-2 animate-pulse">LIVE</span></h1>
                <p class="text-gray-400 text-sm mt-1">Real-time Network Intrusion Prevention System</p>
            </div>
            <div class="flex gap-3">
                <a href="/analytics" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm transition">Analytics</a>
                <a href="/history" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm transition">History</a>
            </div>
        </header>

        <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 mb-6 shadow-lg">
            <h2 class="text-xs font-bold text-blue-400 uppercase mb-4 tracking-widest">Live View Filters</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <div class="space-y-2">
                    <p class="text-xs text-gray-500 font-semibold uppercase">Protocols</p>
                    <div class="flex gap-4">
                        <label class="flex items-center text-sm cursor-pointer"><input type="checkbox" class="proto-filter mr-2 rounded" value="6" checked onchange="updateDashboard()"> TCP</label>
                        <label class="flex items-center text-sm cursor-pointer"><input type="checkbox" class="proto-filter mr-2 rounded" value="17" checked onchange="updateDashboard()"> UDP</label>
                        <label class="flex items-center text-sm cursor-pointer"><input type="checkbox" class="proto-filter mr-2 rounded" value="1" checked onchange="updateDashboard()"> ICMP</label>
                    </div>
                </div>

                <div class="space-y-2">
                    <p class="text-xs text-gray-500 font-semibold uppercase">Source IP</p>
                    <div class="flex items-center gap-3">
                        <label class="text-xs"><input type="radio" name="srcType" value="any" checked onclick="toggleLiveIP('src')"> Any</label>
                        <label class="text-xs"><input type="radio" name="srcType" value="specific" onclick="toggleLiveIP('src')"> Specific</label>
                        <input type="text" id="srcIp" oninput="updateDashboard()" placeholder="192.168.x.x" disabled class="bg-gray-900 border border-gray-700 rounded px-2 py-1 text-xs opacity-50 outline-none w-32 focus:border-blue-500">
                    </div>
                </div>

                <div class="space-y-2">
                    <p class="text-xs text-gray-500 font-semibold uppercase">Destination IP</p>
                    <div class="flex items-center gap-3">
                        <label class="text-xs"><input type="radio" name="dstType" value="any" checked onclick="toggleLiveIP('dst')"> Any</label>
                        <label class="text-xs"><input type="radio" name="dstType" value="specific" onclick="toggleLiveIP('dst')"> Specific</label>
                        <input type="text" id="dstIp" oninput="updateDashboard()" placeholder="10.0.x.x" disabled class="bg-gray-900 border border-gray-700 rounded px-2 py-1 text-xs opacity-50 outline-none w-32 focus:border-blue-500">
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-700/50 text-gray-400 text-xs uppercase font-bold">
                    <tr>
                        <th class="px-6 py-4">Source IP</th>
                        <th class="px-6 py-4">Destination IP</th>
                        <th class="px-6 py-4 text-center">Protocol</th>
                        <th class="px-6 py-4">Severity</th>
                        <th class="px-6 py-4">Action</th>
                    </tr>
                </thead>
                <tbody id="packet-table" class="divide-y divide-gray-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function toggleLiveIP(type) {
            const isAny = document.querySelector(`input[name="${type}Type"]:checked`).value === 'any';
            const input = document.getElementById(`${type}Ip`);
            input.disabled = isAny;
            input.classList.toggle('opacity-50', isAny);
            if(isAny) input.value = '';
            updateDashboard(); // Refresh immediately on radio click
        }

        async function updateDashboard() {
            try {
                const response = await fetch('/data');
                const data = await response.json();
                const tableBody = document.getElementById('packet-table');

                // Get current Filter States
                const allowedProtos = Array.from(document.querySelectorAll('.proto-filter:checked')).map(cb => parseInt(cb.value));
                const srcType = document.querySelector('input[name="srcType"]:checked').value;
                const srcVal = document.getElementById('srcIp').value.trim();
                const dstType = document.querySelector('input[name="dstType"]:checked').value;
                const dstVal = document.getElementById('dstIp').value.trim();

                // Sort data by a timestamp or just reverse it to ensure newest is at the top
                // Since app.py already does packet_log.insert(0, data), the array is already newest-first.
                const packets = data.packets;

                let newContent = '';

                packets.forEach(pkt => {
                    // APPLY FILTERS
                    const protoMatch = allowedProtos.includes(pkt.proto);
                    const srcMatch = (srcType === 'any') || (pkt.src === srcVal);
                    const dstMatch = (dstType === 'any') || (pkt.dst === dstVal);

                    if (protoMatch && srcMatch && dstMatch) {
                        newContent += `
                            <tr class="hover:bg-gray-700/40 transition-colors">
                                <td class="px-6 py-4 font-mono text-sm">${pkt.src}</td>
                                <td class="px-6 py-4 font-mono text-sm text-blue-400">${pkt.dst}</td>
                                <td class="px-6 py-4 text-center">
                                    <span class="bg-gray-900 text-gray-300 px-2 py-1 rounded text-xs border border-gray-600">
                                        ${pkt.proto === 6 ? 'TCP' : pkt.proto === 17 ? 'UDP' : pkt.proto === 1 ? 'ICMP' : pkt.proto}
                                    </span>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="px-2 py-1 rounded text-xs font-bold ${getSeverityClass(pkt.severity || pkt.level)}">
                                        ${(pkt.severity || pkt.level || 'INFO').toUpperCase()}
                                    </span>
                                </td>
                                <td class="px-6 py-4 font-bold text-sm ${pkt.action === 'BLOCKED' ? 'text-red-500' : 'text-green-500'}">
                                    ${pkt.action}
                                </td>
                            </tr>
                        `;
                    }
                });
                
                tableBody.innerHTML = newContent;
            } catch (err) {
                console.error("Dashboard error:", err);
            }
        }

        function getSeverityClass(sev) {
            if (!sev) return 'bg-gray-600';
            const s = sev.toLowerCase();
            if (s === 'high') return 'bg-red-900/40 text-red-400 border border-red-500/50';
            if (s === 'medium') return 'bg-yellow-900/40 text-yellow-400 border border-yellow-500/50';
            if (s === 'low') return 'bg-blue-900/40 text-blue-400 border border-blue-500/50';
            return 'bg-gray-700 text-gray-300';
        }

        // Set refresh interval
        setInterval(updateDashboard, 1500);
        updateDashboard();
    </script>
</body>
</html>
